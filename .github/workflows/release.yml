name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. v0.3.3"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build packages and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Build RPM and Debian packages
        run: |
          mkdir -p package-artifacts
          CONTAINER_ENGINE=docker \
          WSF_PACKAGE_OUTDIR="$PWD/package-artifacts" \
            scripts/test-packages.sh all

      - name: Generate checksums
        run: |
          cd package-artifacts
          find . -maxdepth 1 -type f -printf '%P\n' | sort | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wayland-scroll-factor-release-${{ env.RELEASE_TAG }}
          path: package-artifacts/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" package-artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" package-artifacts/* \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
