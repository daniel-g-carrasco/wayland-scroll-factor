name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    name: Source build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install build and validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            python3-gi \
            gir1.2-adw-1 \
            libgtk-4-1 \
            libadwaita-1-0 \
            desktop-file-utils \
            appstream \
            cppcheck

      - name: Check shell scripts
        run: |
          find scripts -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Static analysis (cppcheck)
        run: |
          # -DWSF_LIBDIR mirrors meson's compile-time define (meson.build:
          # `-DWSF_LIBDIR="<libdir>/wayland-scroll-factor"`, passed only to
          # the tools target). Without it cppcheck explores the
          # `#ifdef WSF_LIBDIR` branch with the macro auto-assumed as int 1,
          # producing a bogus `%s requires char*` on the snprintf in
          # wsf_lib_path. The value is irrelevant to the analysis; it only
          # has to be the string literal the real build uses.
          cppcheck --enable=warning,performance,portability \
            --inline-suppr --error-exitcode=2 --quiet -I src \
            -DWSF_LIBDIR='"/usr/lib/wayland-scroll-factor"' \
            src/ tools/wsf.c

      - name: Build (warnings are errors)
        run: |
          meson setup build --prefix=/usr --buildtype=release --werror
          meson compile -C build

      - name: Validate installed metadata inputs
        run: |
          python3 -m py_compile gui/wsf_gui.py
          desktop-file-validate build/data/io.github.danielgrasso.WaylandScrollFactor.desktop
          grep '^Exec=' build/data/wayland-scroll-factor-hyprland.desktop
          grep '^DesktopNames=Hyprland' build/data/wayland-scroll-factor-hyprland.desktop
          appstreamcli validate --no-net data/io.github.danielgrasso.WaylandScrollFactor.metainfo.xml

      - name: Exercise CLI config I/O
        run: |
          mkdir -p "$RUNNER_TEMP/wsf-home"
          HOME="$RUNNER_TEMP/wsf-home" ./build/tools/wsf set 0.35
          HOME="$RUNNER_TEMP/wsf-home" ./build/tools/wsf get --json | grep 'scroll_vertical_factor'
          HOME="$RUNNER_TEMP/wsf-home" ./build/tools/wsf status --json | grep '"config"'

  distro-smoke:
    name: Distro smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: source

    strategy:
      fail-fast: false
      matrix:
        target:
          - fedora
          - ubuntu
          - debian
          - arch
          - opensuse

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run container smoke test
        run: CONTAINER_ENGINE=docker scripts/test-containers.sh "${{ matrix.target }}"
