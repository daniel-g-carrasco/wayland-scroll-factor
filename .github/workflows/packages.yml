name: Packages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build ${{ matrix.target }} package
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        target:
          - rpm
          - deb

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build package in container
        run: |
          mkdir -p "package-artifacts/${{ matrix.target }}"
          CONTAINER_ENGINE=docker \
          WSF_PACKAGE_OUTDIR="$PWD/package-artifacts/${{ matrix.target }}" \
            scripts/test-packages.sh "${{ matrix.target }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wayland-scroll-factor-${{ matrix.target }}-${{ github.sha }}
          path: package-artifacts/${{ matrix.target }}/*
          if-no-files-found: error
